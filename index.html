.hero.bg-with-image {

}

/* تنسيق الطبقة الشفافة الغامقة لضمان مقروئية النص */
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.4); /* طبقة سوداء بنسبة شفافية 40% (تظليل خفيف) */
    z-index: 1; /* جعل الطبقة فوق الصورة */
}

/* رفع محتوى النص فوق الطبقة الشفافة */
.z-index-2 {
    z-index: 2;
}
